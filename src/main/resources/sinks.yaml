# Dangerous sink catalog — configurable without code changes.
# Add new entries to extend coverage for org-specific or newly-disclosed APIs.
# Format: each entry has a 'pattern' (substring match on full method signature)
#         and a 'riskCategory' label returned in the API response.

sinks:
  - pattern: "Runtime.exec("
    riskCategory: "COMMAND_INJECTION"
  - pattern: "ProcessBuilder"
    riskCategory: "COMMAND_INJECTION"
  - pattern: "ObjectInputStream.readObject("
    riskCategory: "INSECURE_DESERIALIZATION"
  - pattern: "ObjectInputStream.readUnshared("
    riskCategory: "INSECURE_DESERIALIZATION"
  - pattern: "Method.invoke("
    riskCategory: "REFLECTION"
  - pattern: "Class.forName("
    riskCategory: "REFLECTION"
  - pattern: "ClassLoader.defineClass("
    riskCategory: "REFLECTION"
  - pattern: "Statement.execute("
    riskCategory: "SQL_INJECTION"
  - pattern: "Statement.executeQuery("
    riskCategory: "SQL_INJECTION"
  - pattern: "Statement.executeUpdate("
    riskCategory: "SQL_INJECTION"
  - pattern: "Connection.prepareStatement("
    riskCategory: "SQL_INJECTION"
  - pattern: "System.load("
    riskCategory: "NATIVE_CODE_LOAD"
  - pattern: "System.loadLibrary("
    riskCategory: "NATIVE_CODE_LOAD"
  - pattern: "InitialContext.lookup("
    riskCategory: "JNDI_INJECTION"
  - pattern: "lookup("
    riskCategory: "JNDI_INJECTION"
  - pattern: "XPathExpression.evaluate("
    riskCategory: "XML_INJECTION"
  - pattern: "DocumentBuilder.parse("
    riskCategory: "XML_INJECTION"
  - pattern: "SAXParser.parse("
    riskCategory: "XML_INJECTION"
  - pattern: "Cipher.getInstance("
    riskCategory: "WEAK_CRYPTO"
  - pattern: "MessageDigest.getInstance("
    riskCategory: "WEAK_CRYPTO"
  - pattern: "SecretKeySpec("
    riskCategory: "WEAK_CRYPTO"
  - pattern: "ScriptEngine.eval("
    riskCategory: "CODE_INJECTION"
  - pattern: "GroovyShell.evaluate("
    riskCategory: "CODE_INJECTION"
