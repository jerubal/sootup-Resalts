name: SootUp Security Gate

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  sootup-analysis:
    name: Run SootUp Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Target Application
        run: |
          # Build target jar/classes to scan
          ./mvnw clean package -DskipTests
        # If your target is built differently or is in a subdirectory, modify accordingly

      - name: Start SootUp Platform Backend
        run: |
          # Start the backend in background
          nohup java -jar target/sootup-platform-1.0.0.jar > platform.log 2>&1 &
          # Wait for backend to be ready
          npx wait-on http://localhost:8080/api/v1/analyses || sleep 10
        env:
          PORT: 8080

      - name: Run SootUp Security Gate
        run: |
          node ci-gate.js
        env:
          SOOTUP_API_URL: http://localhost:8080
          TARGET_PATH: target/classes
          ENTRY_POINTS: com.sootup.platform.Application
          MAX_TAINT_CHAINS: 0
          MAX_POLICY_VIOLATIONS: 0
          CG_ALGORITHM: CHA
